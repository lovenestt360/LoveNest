<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoveNest</title>
</head>
<body style="margin:0;padding:0;background:#f7f5f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f7f5f5;padding:48px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background:#ffffff;border-radius:20px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,0.06);">

          <!-- Brand header -->
          <tr>
            <td style="padding:36px 40px 28px;text-align:center;border-bottom:1px solid #f5f0f0;">
              <div style="width:8px;height:8px;border-radius:50%;background:#fecdd3;display:inline-block;margin-bottom:14px;"></div>
              <div style="font-size:15px;font-weight:700;color:#1a1a1a;letter-spacing:-0.3px;">LoveNest</div>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:44px 40px 36px;">
              <p style="margin:0 0 8px;font-size:22px;font-weight:700;color:#1a1a1a;line-height:1.3;letter-spacing:-0.4px;">
                Confirma o novo email.
              </p>
              <p style="margin:0 0 32px;font-size:14px;color:#888;line-height:1.7;">
                Clica no botão abaixo para confirmar a alteração do teu endereço de email no LoveNest.
              </p>
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center">
                    <a href="{{ .ConfirmationURL }}"
                       style="display:inline-block;background:#f43f5e;color:#ffffff;font-size:14px;font-weight:600;text-decoration:none;padding:14px 36px;border-radius:14px;letter-spacing:-0.1px;">
                      Confirmar novo email
                    </a>
                  </td>
                </tr>
              </table>
              <p style="margin:28px 0 0;font-size:12px;color:#bbb;text-align:center;line-height:1.6;">
                Se não pediste esta alteração, contacta-nos imediatamente.
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:20px 40px 28px;border-top:1px solid #f5f0f0;text-align:center;">
              <p style="margin:0;font-size:11px;color:#ccc;line-height:1.6;">
                Um espaço privado para o vosso amor.<br/>
                lovenestt.vercel.app
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
