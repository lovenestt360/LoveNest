<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>LoveNest — Sem internet</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100dvh;background:#f8fafc;color:#1a1f36;text-align:center;padding:2rem}
    .wrap{max-width:320px}
    h1{font-size:1.5rem;margin-bottom:.5rem}
    p{color:#64748b;margin-bottom:1.5rem;font-size:.95rem}
    button{background:#1a1f36;color:#fff;border:none;padding:.75rem 1.5rem;border-radius:.5rem;font-size:.95rem;cursor:pointer}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>📡 Sem internet</h1>
    <p>Parece que você está offline. Verifique sua conexão e tente novamente.</p>
    <button onclick="location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
